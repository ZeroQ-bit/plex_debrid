<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>plex_debrid</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <header>
    <div class="brand">
      <h1>plex_debrid</h1>
      <span class="sub">TorBox · automation engine</span>
    </div>
    <div class="header-right">
      <span id="status-pill" class="pill pill--unknown">checking…</span>
      <button id="btn-log" class="btn btn--ghost">Log</button>
    </div>
  </header>

  <main id="main">
    <section class="card">
      <div class="card-head"><h2>Engine</h2><span id="engine-state" class="muted">—</span></div>
      <div class="row">
        <button id="btn-start" class="btn btn--good">Start</button>
        <button id="btn-stop" class="btn btn--bad">Stop</button>
        <button id="btn-restart" class="btn">Restart</button>
      </div>
    </section>
    <div id="cards"></div>
  </main>

  <div id="savebar" class="savebar hidden">
    <span id="dirty-note" class="muted">Unsaved changes</span>
    <button id="btn-save" class="btn">Save</button>
    <button id="btn-save-restart" class="btn btn--good">Save &amp; Restart</button>
  </div>

  <div id="log-drawer" class="drawer hidden">
    <div class="drawer-head"><h2>Engine log</h2><button id="btn-close-log" class="btn btn--ghost">×</button></div>
    <pre id="log" class="log">loading…</pre>
  </div>

<script>
const api = (path, opts) => fetch(path, opts).then(r => r.ok ? r.json() : r.json().then(e => Promise.reject(e)));
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let schema = null, values = {}, dirty = false;

function markDirty() { dirty = true; document.getElementById('savebar').classList.remove('hidden'); }
function clearDirty() { dirty = false; document.getElementById('savebar').classList.add('hidden'); }

function fieldHtml(f) {
  const v = values[f.key];
  const help = f.help ? `<span class="muted small">${esc(f.help)}</span>` : '';
  if (f.control === 'toggle') {
    return `<label class="toggle-row">
      <span class="toggle-label">${esc(f.label)}${help ? `<br>${help}` : ''}</span>
      <span class="toggle"><input type="checkbox" data-key="${f.key}" data-control="toggle" ${v ? 'checked' : ''}><span class="slider"></span></span>
    </label>`;
  }
  if (f.control === 'select') {
    const opts = (f.options||[]).map(o => `<option value="${esc(o)}" ${v===o?'selected':''}>${esc(o)}</option>`).join('');
    return `<label>${esc(f.label)}<select data-key="${f.key}" data-control="select"><option value="">— none —</option>${opts}</select>${help}</label>`;
  }
  if (f.control === 'multiselect') {
    // For dynamic_options (plex sections, overseerr users), options may arrive
    // async; render what we have. plex_sections maps key->title for display.
    const optList = f._resolved_options || f.options || [];
    const labelOf = o => (f._option_labels && f._option_labels[o]) ? f._option_labels[o] : o;
    const chips = optList.map(o => {
      const on = Array.isArray(v) && v.map(String).includes(String(o));
      return `<button type="button" class="chip ${on?'chip--on':''}" data-key="${f.key}" data-control="multiselect" data-val="${esc(o)}">${esc(labelOf(o))}</button>`;
    }).join('');
    const discover = f.dynamic_options === 'plex_sections'
      ? `<button type="button" class="btn btn--ghost btn--discover" data-target="${esc(f.key)}">Discover</button>` : '';
    const empty = optList.length === 0 && f.dynamic_options === 'plex_sections'
      ? `<span class="muted small">Click Discover to load your Plex libraries.</span>` : '';
    return `<label>${esc(f.label)}<div class="chips">${chips}</div>${empty}${discover}${help}</label>`;
  }
  if (f.control === 'connect') {
    const connected = Array.isArray(v) && v.length > 0;
    const names = (v||[]).map(u => esc(u.name||u[0]||'')).join(', ');
    return `<label>${esc(f.label)}
      <div class="connect-row">
        <button type="button" class="btn btn--connect" data-flow="${esc(f.flow)}" data-key="${f.key}">${connected ? 'Reconnect' : 'Connect'}</button>
        ${connected ? `<span class="ok">✓ ${names}</span>` : ''}
      </div>
      <div class="connect-status" data-flow="${esc(f.flow)}"></div>${help}</label>`;
  }
  if (f.control === 'password') {
    const prov = f.key.replace(' API Key','');
    return `<label>${esc(f.label)}
      <div class="row">
        <input type="password" data-key="${f.key}" data-control="password" value="${esc(v)}" placeholder="${esc(f.placeholder||'')}">
        <button type="button" class="btn btn--ghost btn--test" data-provider="${esc(prov)}" data-key="${f.key}">Test</button>
      </div>${help}</label>`;
  }
  if (f.control === 'list') {
    return `<label>${esc(f.label)}<textarea data-key="${f.key}" data-control="list" class="input input--code">${esc(typeof v==='string'?v:JSON.stringify(v,null,2))}</textarea>${help}</label>`;
  }
  return `<label>${esc(f.label)}<input type="text" data-key="${f.key}" data-control="text" value="${esc(v)}" placeholder="${esc(f.placeholder||'')}">${help}</label>`;
}

function shouldShow(f) {
  if (!f.show_if) return true;
  const [k, val] = Object.entries(f.show_if)[0];
  const cur = values[k];
  return Array.isArray(cur) ? cur.includes(val) : cur === val;
}

function render() {
  document.getElementById('cards').innerHTML = schema.groups.map(g => `
    <section class="card" data-group="${esc(g.name)}">
      <div class="card-head"><h2>${esc(g.name)}</h2></div>
      ${g.fields.filter(shouldShow).map(fieldHtml).join('')}
    </section>`).join('');
  bindEvents();
}

function snapshotIntoValues() {
  document.querySelectorAll('[data-key]').forEach(el => {
    const k = el.dataset.key, c = el.dataset.control;
    if (c === 'toggle') values[k] = el.checked;
    else if (c === 'list') { try { values[k] = JSON.parse(el.value); } catch { values[k] = el.value; } }
    else if (c && c !== 'multiselect') values[k] = el.value;
  });
  const ms = {};
  document.querySelectorAll('.chip[data-control="multiselect"]').forEach(ch => {
    (ms[ch.dataset.key] = ms[ch.dataset.key] || []).push(...(ch.classList.contains('chip--on')?[ch.dataset.val]:[]));
  });
  Object.entries(ms).forEach(([k, arr]) => values[k] = arr);
}

function reRender() { snapshotIntoValues(); render(); }
function collectEdits() { snapshotIntoValues(); const e={}; for (const g of schema.groups) for (const f of g.fields) if (values[f.key]!==undefined) e[f.key]=values[f.key]; return e; }

function bindEvents() {
  document.querySelectorAll('input[data-control],textarea[data-control],select[data-control]').forEach(el => {
    const handler = () => { markDirty(); if (el.dataset.control==='select'||el.dataset.control==='multiselect') reRender(); };
    el.addEventListener('input', handler); el.addEventListener('change', handler);
  });
  document.querySelectorAll('.chip[data-control="multiselect"]').forEach(ch =>
    ch.addEventListener('click', () => { ch.classList.toggle('chip--on'); markDirty(); reRender(); }));
  document.querySelectorAll('.btn--test').forEach(b => b.addEventListener('click', () => testDebrid(b.dataset.provider, b.dataset.key)));
  document.querySelectorAll('.btn--connect').forEach(b => b.addEventListener('click', () => startConnect(b.dataset.flow, b.dataset.key)));
  document.querySelectorAll('.btn--discover').forEach(b => b.addEventListener('click', () => discoverPlexSections(b.dataset.target)));
}

async function testDebrid(provider, key) {
  const keyVal = document.querySelector(`input[data-key="${key}"]`)?.value || values[key] || '';
  const out = document.querySelector(`.btn--test[data-key="${key}"]`); if(!out) return;
  const wrap = out.parentElement; wrap.innerHTML = `<span class="muted result-inline">testing…</span>`;
  try {
    const r = await api('/api/test-debrid', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider, api_key: keyVal})});
    let html;
    if (r.valid === true) {
      let extra=''; if(r.email)extra=` — ${esc(r.email)}`; if(r.plan)extra+=` · ${esc(r.plan)}${r.premium?' · premium':''}`;
      html = `<span class="ok result-inline">✓ valid${extra}</span>`;
    } else if (r.valid === false) html = `<span class="err result-inline">✗ ${esc(r.error||'invalid')}</span>`;
    else html = `<span class="muted result-inline">${esc(r.detail||'stored')}</span>`;
    wrap.innerHTML = `<input type="password" data-key="${key}" data-control="password" value="${esc(keyVal)}"><span class="result-inline">${html}</span>`;
    wrap.parentElement.querySelector('span.muted.small')?.remove();
    bindEvents();
  } catch(e) { wrap.innerHTML = `<span class="err result-inline">✗ ${esc(e.error||e)}</span>`; }
}

let pollTimers = {};
async function startConnect(flow, key) {
  const status = document.querySelector(`.connect-status[data-flow="${flow}"]`);
  const start = flow === 'plex' ? '/api/plex/pin/start' : '/api/trakt/device/start';
  try {
    const r = await api(start, {method:'POST'});
    if (r.error) { status.innerHTML = `<span class="err">${esc(r.error)}</span>`; return; }
    const code = flow === 'plex' ? r.code : r.user_code, url = r.url;
    status.innerHTML = `<div class="connect-prompt">
      <a href="${esc(url)}" target="_blank" class="btn btn--connect">Open ${flow==='plex'?'Plex':'Trakt'} →</a>
      <div class="code-box">Enter code: <code>${esc(code)}</code></div>
      <span class="muted small">Waiting for approval…</span></div>`;
    window.open(url, '_blank'); markDirty();
    pollConnect(flow, key, flow==='plex'?r.id:r.device_code, status);
  } catch(e) { status.innerHTML = `<span class="err">${esc(e.error||e)}</span>`; }
}

function pollConnect(flow, key, idOrCode, statusEl) {
  const poll = flow === 'plex' ? `/api/plex/pin/poll?id=${idOrCode}` : `/api/trakt/device/poll?code=${idOrCode}`;
  if (pollTimers[flow]) clearTimeout(pollTimers[flow]);
  const tick = async () => {
    try {
      const r = await api(poll);
      if (r.done) {
        if (r.error) { statusEl.innerHTML = `<span class="err">${esc(r.error)}</span>`; return; }
        const name = flow === 'plex' ? 'plex' : 'trakt';
        values[key] = [[name, r.token]];
        statusEl.innerHTML = `<span class="ok">✓ connected</span>`;
        reRender();
        return;
      }
      pollTimers[flow] = setTimeout(tick, 3000);
    } catch(e) { statusEl.innerHTML = `<span class="err">${esc(e.error||e)}</span>`; }
  };
  tick();
}

async function discoverPlexSections(targetKey) {
  const btn = document.querySelector(`.btn--discover[data-target="${targetKey}"]`);
  if (btn) { btn.textContent = '…'; btn.disabled = true; }
  try {
    // Send the in-memory Plex users + server URL so discovery works even
    // before the user clicks Save (the token may not be on disk yet).
    const r = await api('/api/plex/sections', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({users: values['Plex users'], server: values['Plex server address']})});
    if (r.error) { if (btn) btn.outerHTML = `<span class="err small">${esc(r.error)}</span>`; return; }
    // Cache the discovered sections + a key->title map on every field that uses them.
    const keys = r.sections.map(s => s.key);
    const labels = {}; r.sections.forEach(s => { labels[s.key] = `${s.title} (${s.type})`; });
    for (const g of schema.groups) for (const f of g.fields) {
      if (f.dynamic_options === 'plex_sections') {
        f._resolved_options = keys;
        f._option_labels = labels;
      }
    }
    render();  // re-render so chips appear for both refresh + check fields
  } catch(e) { if (btn) btn.outerHTML = `<span class="err small">${esc(e.error||e)}</span>`; }
}

async function save(restart) {
  const edits = collectEdits();
  try {
    await api('/api/settings', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(edits)});
    if (restart) { await api('/api/engine/restart',{method:'POST'}); flash('Saved. Restarting…'); refreshStatus(); }
    else flash('Saved');
    clearDirty(); await loadSettings();
  } catch(e) { flash('Save failed: '+(e.error||e), true); }
}

async function refreshStatus() {
  try {
    const s = await api('/api/status');
    const pill = document.getElementById('status-pill'), st = document.getElementById('engine-state');
    if (s.engine.running) { pill.className='pill pill--good'; pill.textContent='running'; st.textContent=`running (pid ${s.engine.pid})`; }
    else { pill.className='pill pill--bad'; pill.textContent='stopped'; st.textContent='stopped'; }
    const log = document.getElementById('log');
    if (s.log_tail) { log.textContent = s.log_tail; log.scrollTop = log.scrollHeight; }
  } catch { document.getElementById('status-pill').textContent='offline'; }
}
async function refreshLog() { const r = await api('/api/logs'); const l=document.getElementById('log'); l.textContent=r.lines||'(empty)'; l.scrollTop=l.scrollHeight; }
function flash(msg, err) { const p=document.getElementById('status-pill'); p.className='pill '+(err?'pill--bad':'pill--good'); p.textContent=msg; setTimeout(refreshStatus, 2500); }

async function loadSettings() {
  const data = await api('/api/settings');
  schema = await api('/api/schema');
  const byKey = {}; for (const g of schema.groups) for (const f of g.fields) byKey[f.key] = f;
  values = {}; for (const g of data.groups) for (const f of g.fields) values[f.key] = f.value;
  schema.groups.forEach(g => g.fields.forEach(f => { Object.assign(f, byKey[f.key]||{}); }));
  render();
}

document.getElementById('btn-save').onclick = () => save(false);
document.getElementById('btn-save-restart').onclick = () => save(true);
document.getElementById('btn-start').onclick = async () => { await api('/api/engine/start',{method:'POST'}); refreshStatus(); };
document.getElementById('btn-stop').onclick = async () => { await api('/api/engine/stop',{method:'POST'}); refreshStatus(); };
document.getElementById('btn-restart').onclick = async () => { await api('/api/engine/restart',{method:'POST'}); refreshStatus(); };
document.getElementById('btn-log').onclick = () => { document.getElementById('log-drawer').classList.toggle('hidden'); refreshLog(); };
document.getElementById('btn-close-log').onclick = () => document.getElementById('log-drawer').classList.add('hidden');

loadSettings();
refreshStatus();
setInterval(refreshStatus, 5000);
</script>
</body>
</html>
